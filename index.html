<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碩豐熱泵主機智慧診斷與專家級解決方案系統</title>
    <style>
        body {
            font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #1e293b;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 4px solid #0284c7;
            padding-bottom: 15px;
            font-size: 28px;
            letter-spacing: 1px;
        }
        h2 {
            color: #38bdf8;
            font-size: 20px;
            margin-top: 0;
            border-bottom: 1px solid #475569;
            padding-bottom: 8px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #475569;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #0f172a;
            color: #f1f5f9;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
            letter-spacing: 1.5px;
        }
        button:hover {
            background: linear-gradient(135deg, #0369a1 0%, #075985 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(2, 132, 199, 0.4);
        }
        .result-box {
            margin-top: 35px;
            padding: 25px;
            border-radius: 12px;
            display: none;
            border-width: 1px;
            border-style: solid;
        }
        .normal {
            background-color: #064e3b;
            border-color: #059669;
            color: #ecfdf5;
        }
        .warning {
            background-color: #78350f;
            border-color: #d97706;
            color: #fefbeb;
        }
        .danger {
            background-color: #7f1d1d;
            border-color: #dc2626;
            color: #fef2f2;
        }
        .result-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-top: 20px;
            margin-bottom: 8px;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .normal .section-title {
            color: #34d399;
        }
        .warning .section-title {
            color: #fbbf24;
        }
        .danger .section-title {
            color: #fca5a5;
        }
        .solution-step {
            margin-bottom: 12px;
            padding-left: 15px;
            border-left: 3px solid rgba(255,255,255,0.3);
        }
        .solution-step strong {
            color: #ffffff;
        }
        ul, ol {
            padding-left: 20px;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        li {
            margin-bottom: 6px;
        }
        .calc-badge {
            background-color: rgba(255, 255, 255, 0.15);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 熱泵智慧診斷與專家級解決方案 (kg/cm²版)</h1>
    
    <div class="grid-container">
        <!-- 左側：壓力與冷媒數據 -->
        <div>
            <h2>📊 壓力與冷媒參數</h2>
            <div class="form-group">
                <label for="refrigerant">冷媒種類</label>
                <select id="refrigerant">
                    <option value="R32">R32 (高溫高壓型 / 微可燃 A2L)</option>
                    <option value="R410A">R410A (主流商用 / 高壓型)</option>
                    <option value="R417A">R417A (R22替代 / 中低壓型)</option>
                    <option value="R134a">R134a (高溫熱水 / 中低壓型)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="low_press">實測低壓側壓力 (kg/cm²)</label>
                <input type="number" id="low_press" step="0.1" placeholder="請輸入低壓表公斤數，例如：8.5">
            </div>

            <div class="form-group">
                <label for="high_press">實測高壓側壓力 (kg/cm²)</label>
                <input type="number" id="high_press" step="0.1" placeholder="請輸入高壓表公斤數，例如：31.5">
            </div>

            <div class="form-group">
                <label for="voltage">輸入線電壓 (V)</label>
                <input type="number" id="voltage" step="1" placeholder="例如：220 或 380">
            </div>

            <div class="form-group">
                <label for="sound">聽診異音診斷</label>
                <select id="sound">
                    <option value="normal">無異音（平穩運轉音）</option>
                    <option value="metal">尖銳金屬磨損聲 / 連續液槌敲擊聲</option>
                    <option value="heavy_hum">重負載沉悶嗡嗡聲（隨壓力升高而變大）</option>
                    <option value="shudder">啟動時接觸器快速跳火噠噠聲 / 機體劇烈抖動</option>
                    <option value="hissing">膨脹閥處發出連續且尖銳的「嘶嘶」氣流聲</option>
                </select>
            </div>
        </div>

        <!-- 右側：深度溫度數據 -->
        <div>
            <h2>🌡️ 系統關鍵溫度數據</h2>
            <div class="form-group">
                <label for="temp_dis">壓縮機 排氣溫度 (°C)</label>
                <input type="number" id="temp_dis" step="0.1" placeholder="請輸入排氣溫度">
            </div>

            <div class="form-group">
                <label for="temp_suc">壓縮機 吸氣溫度 (°C)</label>
                <input type="number" id="temp_suc" step="0.1" placeholder="吸氣管結露處實測溫度">
            </div>

            <div class="form-group">
                <label for="water_in">冷凝器 入水溫度 (°C)</label>
                <input type="number" id="water_in" step="0.1" placeholder="循環水進入主機之水溫">
            </div>

            <div class="form-group">
                <label for="water_out">冷凝器 出水溫度 (°C)</label>
                <input type="number" id="water_out" step="0.1" placeholder="熱泵加熱後流出之水溫">
            </div>

            <div class="form-group">
                <label for="current_pct">運轉電流狀態</label>
                <select id="current_pct">
                    <option value="normal">正常運轉電流 (額定電流的 60% ~ 95%)</option>
                    <option value="low">極低電流 (低於額定電流的 50%)</option>
                    <option value="high">過高電流 (接近或超過額定電流的 105%)</option>
                    <option value="unbalance">三相電流極度不平衡 (不平衡率 > 10%)</option>
                </select>
            </div>
        </div>
    </div>

    <button onclick="diagnoseSystem()">💡 執行專家級系統診斷與分析</button>

    <!-- 診斷報告輸出區 -->
    <div id="result" class="result-box">
        <div id="res_title" class="result-title"></div>
        
        <div class="section-title">📊 系統自動計算指標</div>
        <div id="calc_metrics"></div>

        <div class="section-title">📉 數據異常分析報告</div>
        <p id="res_desc"></p>
        
        <div class="section-title">🔧 專家級解決方案與現場處置 SOP</div>
        <div id="res_solution"></div>
    </div>
</div>

<script>
// 簡單的壓力-飽和溫度近似函數，用於估算蒸發溫度，以計算過熱度
function estimateEvapTemp(ref, press_kg) {
    // 壓力單位為 kg/cm2，轉換為 bar 約 * 0.98
    const p = press_kg * 0.980665;
    if (p <= 0.1) return -50;
    
    // 各冷媒的飽和溫度估算公式 (Antoine 簡化公式)
    if (ref === "R134a") {
        return 1612.37 / (10.053 - Math.log10(p * 1000)) - 231.6;
    } else if (ref === "R410A" || ref === "R32") {
        // R32與R410A壓力接近
        return 1400 / (9.8 - Math.log10(p * 1000)) - 245;
    } else if (ref === "R417A") {
        return 1480 / (9.9 - Math.log10(p * 1000)) - 240;
    }
    return 0;
}

function diagnoseSystem() {
    const ref = document.getElementById("refrigerant").value;
    const lp = parseFloat(document.getElementById("low_press").value);
    const hp = parseFloat(document.getElementById("high_press").value);
    const t_dis = parseFloat(document.getElementById("temp_dis").value);
    const t_suc = parseFloat(document.getElementById("temp_suc").value);
    const w_in = parseFloat(document.getElementById("water_in").value);
    const w_out = parseFloat(document.getElementById("water_out").value);
    
    const volt = parseFloat(document.getElementById("voltage").value);
    const curr = document.getElementById("current_pct").value;
    const sound = document.getElementById("sound").value;

    const resultDiv = document.getElementById("result");
    const resTitle = document.getElementById("res_title");
    const resDesc = document.getElementById("res_desc");
    const resSol = document.getElementById("res_solution");
    const calcMetrics = document.getElementById("calc_metrics");

    resultDiv.style.display = "block";
    resultDiv.className = "result-box";
    resSol.innerHTML = "";
    calcMetrics.innerHTML = "";

    // 1. 基本參數防呆
    if (isNaN(lp) || isNaN(hp) || isNaN(t_dis)) {
        resultDiv.className += " warning";
        resTitle.innerHTML = "⚠️ 系統提示：輸入參數不完整";
        resDesc.innerHTML = "請至少填寫【低壓側壓力】、【高壓側壓力】與【排氣溫度】，才能進行基本系統化診斷。";
        return;
    }

    // 計算輔助指標
    let superheat = null;
    let water_diff = null;
    let metricsHTML = "";

    if (!isNaN(t_suc)) {
        const t_evap = estimateEvapTemp(ref, lp);
        superheat = t_suc - t_evap;
        metricsHTML += `<span class="calc-badge">吸氣過熱度 (SH): ${superheat.toFixed(1)} °C</span>`;
    } else {
        metricsHTML += `<span class="calc-badge" style="background-color:rgba(239,68,68,0.2);">吸氣溫度未填 (無法計算過熱度)</span>`;
    }

    if (!isNaN(w_in) && !isNaN(w_out)) {
        water_diff = w_out - w_in;
        metricsHTML += `<span class="calc-badge">水側加熱溫差 (ΔT): ${water_diff.toFixed(1)} °C</span>`;
    } else {
        metricsHTML += `<span class="calc-badge" style="background-color:rgba(239,68,68,0.2);">進出水溫未填 (無法計算水側溫差)</span>`;
    }
    calcMetrics.innerHTML = metricsHTML;

    // 各冷媒性能指標邊界設定 (單位：kg/cm2)
    // 轉換公式：MPa * 10.197 = kg/cm2
    const bounds = {
        "R32":   { lp_min: 5.1, lp_max: 9.7, hp_max: 36.7, eq_lp: 15.3, eq_hp: 18.4, max_temp: 110 },
        "R410A": { lp_min: 4.6, lp_max: 9.2, hp_max: 36.7, eq_lp: 15.3, eq_hp: 18.4, max_temp: 100 },
        "R417A": { lp_min: 2.2, lp_max: 5.3, hp_max: 23.5, eq_lp: 8.2,  eq_hp: 10.2, max_temp: 90 },
        "R134a": { lp_min: 1.2, lp_max: 3.9, hp_max: 19.9, eq_lp: 8.2,  eq_hp: 10.2, max_temp: 95 }
    };
    const bound = bounds[ref];

    // 2. 電壓檢測邏輯
    if (!isNaN(volt) && (volt < 198 && volt > 100 || volt < 342 && volt > 240)) {
        resultDiv.className += " warning";
        resTitle.innerHTML = "⚠️ 電源品質警訊：供電電壓過低";
        resDesc.innerHTML = `當前實測輸入線電壓為 <strong>${volt} V</strong>，大幅低於標準額定電壓的 -10% 下限。此狀態會造成主機啟動瞬間電流異常飆高，進而使電機發熱、熱過載保護跳機。`;
        resSol.innerHTML = `
            <div class="solution-step">
                <strong>第一步【電控迴路巡檢】：</strong> 
                使用三用電表測量配電盤端子與接觸器進線端，確認是否由於線徑不足、線路過長導致瞬間壓降。
            </div>
            <div class="solution-step">
                <strong>第二步【接頭碳化排除】：</strong> 
                切斷總電源，檢查電磁接觸器的主觸點是否因高溫發生碳化、燒蝕。若觸點黑化，必須立即更換接觸器。
            </div>`;
        return;
    }

    // 3. 診斷邏輯一：壓縮機內部嚴重串氣（無做功能力）
    if ((lp >= bound.eq_lp && hp <= bound.eq_hp) || (water_diff !== null && water_diff <= 0.5)) {
        resultDiv.className += " danger";
        resTitle.innerHTML = "❌ 系統致命損壞：壓縮機內部串氣 (閥片破損)";
        resDesc.innerHTML = `【高低壓差喪失】實測低壓高達 ${lp} kg/cm²，高壓滑落至 ${hp} kg/cm²，系統基本無壓差，且進出水溫差 (ΔT) 僅 ${water_diff !== null ? water_diff.toFixed(1) : "N/A"} °C。運轉電流遠低於額定值。此為往復式閥片斷裂、或渦旋盤滑動密封環燒熔失效之特徵。`;
        resSol.innerHTML = `
            <div class="solution-step">
                <strong>步驟 1【閥片破損雙重判定】：</strong> 
                關閉系統，手動短接高壓旁通。若在主機啟動後，高壓表與低壓表指標完全不動，或運轉電流極低且聽不見正常的排氣金屬聲，100% 判定為閥片破損。
            </div>
            <div class="solution-step">
                <strong>步驟 2【系統冷媒回收及清洗】：</strong> 
                使用專用冷媒回收機將冷媒完全排空。<strong>注意：</strong> 由於壓縮機磨損會產生金屬微粒與酸化冷凍油，在直接安裝新機前，必須使用專用清洗劑對管路進行反向吹洗，否則新壓縮機會在 100 小時內二度燒毀。
            </div>
            <div class="solution-step">
                <strong>步驟 3【核心硬體更換作業】：</strong> 
                <ul>
                    <li>拆除損壞壓縮機，更新同型號原廠壓縮機。</li>
                    <li>更換高容量雙向乾燥過濾器。</li>
                    <li>執行高真空抽空（真空度必須達到 500 微米以下）。</li>
                    <li>使用電子磅秤定量充填全新冷媒。</li>
                </ul>
            </div>`;
        return;
    }

    // 4. 診斷邏輯二：高壓保護（熱交換不良/散熱極差）
    if (hp > bound.hp_max || curr === "high" || sound === "heavy_hum" || (water_diff !== null && water_diff > 8.0)) {
        resultDiv.className += " danger";
        resTitle.innerHTML = "❌ 系統安全警報：高壓過高保護 (冷凝側水路異常)";
        resDesc.innerHTML = `實測高壓 ${hp} kg/cm² 已跨越安全臨界值（${bound.hp_max} kg/cm²）。當前排氣溫度為 ${t_dis}°C。${water_diff !== null && water_diff > 8.0 ? '實測進出水溫差高達 ' + water_diff.toFixed(1) + '°C，代表水流量嚴重不足！' : ''}主要病因為熱交換失效。`;
        resSol.innerHTML = `
            <div class="solution-step">
                <strong>步驟 1【水路與過濾系統巡檢】：</strong> 
                <ul>
                    <li>若進出水溫差過大（> 8°C），說明循環水流量嚴重不足。請檢查循環水泵是否燒毀、反轉，或管道內發生氣阻（Air Lock）。若有氣阻，打開水路排氣閥排空。</li>
                    <li>拆洗水路「Y型過濾器」，清除過濾網內殘留的鐵屑、泥沙，恢復標準額定水流量。</li>
                </ul>
            </div>
            <div class="solution-step">
                <strong>步驟 2【化學除垢清洗（溫差極小但高壓偏高時適用）】：</strong> 
                若水泵運轉正常、過濾器無堵，但進出水溫差極小，且高壓表依然飆高，判定為冷凝器內部水側結垢（碳酸鈣沉積）。應使用專用弱酸除垢劑與循環水泵，對板式/套管熱交換器進行 2 ~ 3 小時的反向化學循環沖洗。
            </div>
            <div class="solution-step">
                <strong>步驟 3【不凝結氣體與過量冷媒排除】：</strong> 
                若為新機組或剛維修過，且排氣溫度極高，判定為系統內混入空氣。應回收冷媒，重新精準抽真空，並依機身銘牌上的冷媒克數定量充填。
            </div>`;
        return;
    }

    // 5. 診斷邏輯三：低壓保護（冷媒洩漏 / 節流元件堵塞）
    if (lp < bound.lp_min || sound === "hissing" || (superheat !== null && superheat > 15.0)) {
        resultDiv.className += " danger";
        resTitle.innerHTML = "❌ 系統安全警報：低壓過低保護 (冷媒循環受阻 / 洩漏)";
        resDesc.innerHTML = `實測低壓僅 ${lp} kg/cm²（安全臨界值為 ${bound.lp_min} kg/cm²）。${superheat !== null ? '目前吸氣過熱度高達 ' + superheat.toFixed(1) + '°C，代表節流閥開度不足或嚴重缺冷媒！' : ''}壓縮機回氣冷媒極少，排氣溫度高達 ${t_dis}°C，壓縮機無法有效散熱。`;
        resSol.innerHTML = `
            <div class="solution-step">
                <strong>步驟 1【區分「漏」還是「堵」】：</strong> 
                <ul>
                    <li><strong>判斷洩漏：</strong> 觀察乾燥過濾器與管路焊點，若有明顯油漬滲出，說明冷媒有洩漏點。</li>
                    <li><strong>判斷髒堵：</strong> 用手觸摸乾燥過濾器的進出口端，若能感覺到明顯溫差（> 1.5°C），且過濾器後段管路結霜，說明乾燥過濾器內部已被雜質完全堵塞。</li>
                    <li><strong>判斷冰堵：</strong> 關機，用 80°C 熱毛巾反覆熱敷膨脹閥閥體 5 ~ 10 分鐘。若重新開機後低壓能短暫回復正常，100% 判定為系統內含水造成的「冰堵」。</li>
                </ul>
            </div>
            <div class="solution-step">
                <strong>步驟 2【系統維修處置 SOP】：</strong> 
                <ul>
                    <li><strong>若為洩漏：</strong> 用肥皂水或電子漏氣儀抓漏，修復漏點。<strong>特別提醒：R410A 與 R417A 為非/近共沸冷媒，若洩漏量大於 20%，必須全部排空回收重新定量充填，不可直接追加。</strong></li>
                    <li><strong>若為冰堵：</strong> 必須將冷媒回收，更換具有強效吸水功能的「雙向乾燥過濾器」，重新抽高真空並維持 1 小時以上，徹底吸乾管路內殘留水氣後再重新充填全新冷媒。</li>
                    <li><strong>若為髒堵：</strong> 更換損壞的乾燥過濾器，並拆卸、清洗或更換膨脹閥濾網。</li>
                </ul>
            </div>`;
        return;
    }

    // 6. 診斷邏輯四：液擊（低吸氣過熱度 / 冷凍油稀釋）
    if (sound === "metal" || t_dis < 50 || (superheat !== null && superheat < 2.0)) {
        resultDiv.className += " warning";
        resTitle.innerHTML = "⚠️ 系統危險警訊：壓縮機液擊 (Liquid Slugging)";
        resDesc.innerHTML = `當前排氣溫度僅 ${t_dis}°C${superheat !== null ? '，且吸氣過熱度僅有危險的 ' + superheat.toFixed(1) + '°C' : ''}。此狀態代表大量液態冷媒未在蒸發器內完全汽化，直接進入壓縮機腔體。此舉會嚴重稀釋冷凍油，導致壓縮機短時間內發生「抱軸、燒卡」致命損毀。`;
        resSol.innerHTML = `
            <div class="solution-step">
                <strong>步驟 1【緊急調小節流閥開度】：</strong> 
                如果是熱力膨脹閥，請將調節螺桿順時針方向（往關小、提高過熱度方向）旋轉 1/2圈 到 1圈；若是電子膨脹閥，請至控制器中調大「吸氣過熱度 (Target Superheat)」參數，確保過熱度回復到 5°C ~ 8°C。
            </div>
            <div class="solution-step">
                <strong>步驟 2【蒸發側熱交換檢查】：</strong> 
                <ul>
                    <li><strong>空氣源熱泵：</strong> 清洗翅片表面，檢查蒸發風機馬達電容是否老化、風扇轉速是否偏慢。若風量不夠，冷媒在蒸發器無法吸收空氣中的熱量，會直接以液態流回壓縮機。</li>
                    <li><strong>水源熱泵：</strong> 檢查蒸發器側水流量是否過小、水泵是否老化、管路過濾網是否髒堵。</li>
                </ul>
            </div>
            <div class="solution-step">
                <strong>步驟 3【冷凍油潤滑品質檢查】：</strong> 
                從壓縮機視油鏡檢查冷凍油顏色。若已酸化（呈黃褐色或黑褐色），切勿繼續開機。必須更換同規格全新冷凍油，防止軸承磨損惡化。
            </div>`;
        return;
    }

    // 7. 運轉正常
    resultDiv.className += " normal";
    resTitle.innerHTML = "✅ 系統狀態評估：運轉正常";
    resDesc.innerHTML = `比對結果顯示，當前實測數據（高壓 ${hp} kg/cm² / 低壓 ${lp} kg/cm² / 排氣溫度 ${t_dis}°C）完全落在冷媒 <strong>${ref}</strong> 的最佳效能運行區間內。聲音與電氣參數無明顯異常。`;
    resSol.innerHTML = `
        <div class="solution-step">
            <strong>日常維護方案：</strong>
            <ul>
                <li><strong>水路定期排砂：</strong> 每月手動清理循環水系統的 Y 型過濾器一次，避免結垢前兆。</li>
                <li><strong>翅片除塵保養：</strong> 對於空氣源主機，每季度應使用高壓噴霧器對蒸發器進行除塵清洗，保持通風。</li>
                <li><strong>運轉數據存檔：</strong> 建議在每季巡檢時，將「高壓、低壓、排氣溫度、運轉電流」記錄存檔，以便進行設備生命週期之效能劣化趨勢預測。</li>
            </ul>
        </div>`;
}
</script>

</body>
</html>
