<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碩豐熱泵AI診斷與履歷戰情平台</title>
    <!-- 二維碼生成套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Chart.js 趨勢圖套件 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif; background-color: #0b1120; color: #f1f5f9; margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 1250px; margin: 0 auto; background: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border: 1px solid #334155; }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 20px; border-bottom: 4px solid #0284c7; padding-bottom: 15px; font-size: 24px; }
        h2 { color: #38bdf8; font-size: 16px; margin-top: 10px; margin-bottom: 12px; border-bottom: 1px solid #334155; padding-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        
        /* 戰情室 KPI 看板 */
        .kpi-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .kpi-card { background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
        .kpi-card .num { font-size: 26px; font-weight: bold; margin-top: 5px; }
        .kpi-card .label { font-size: 12px; color: #94a3b8; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-inner-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        
        @media (max-width: 960px) { .grid-3 { grid-template-columns: 1fr; } .kpi-container { grid-template-columns: 1fr 1fr; } }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #94a3b8; font-size: 13px; }
        select, input, textarea { width: 100%; padding: 9px 12px; border: 1px solid #334155; border-radius: 8px; box-sizing: border-box; font-size: 14px; background-color: #0f172a; color: #f1f5f9; transition: border-color 0.2s; }
        select:focus, input:focus, textarea:focus { border-color: #38bdf8; outline: none; }
        textarea { resize: vertical; height: 110px; }
        
        /* 按鈕風格 (參考鍋爐介面) */
        .btn-action-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; margin-bottom: 10px; }
        .btn-sm { padding: 9px; font-size: 13px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; color: white; transition: opacity 0.2s; }
        .btn-sm:hover { opacity: 0.9; }
        .btn-blue { background: #0284c7; }
        .btn-green { background: #10b981; }
        .btn-red { background: #9f1239; width: 100%; margin-bottom: 10px; }
        .btn-purple { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); width: 100%; font-size: 14px; padding: 10px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .btn-group { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        button.btn-main { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; min-width: 140px; }
        .btn-diagnose { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white; flex-basis: 100%; margin-bottom: 10px; font-size: 17px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        .btn-save { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; }
        .btn-export { background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); color: white; }
        .btn-clear { background: #475569; color: white; }
        
        /* 設備卡片式邊框 */
        .card-box { background: #0f172a; padding: 16px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .sub-section-box { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px; }

        /* QR Code 顯示區 (完美還原鍋爐風格) */
        .qr-section { background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #4f46e5; margin-top: 12px; display: none; text-align: center; }
        .qr-title { font-size: 13px; font-weight: bold; color: #a5b4fc; margin-bottom: 8px; }
        #qrcode-canvas { display: inline-block; background: white; padding: 10px; border-radius: 10px; margin-top: 5px; }
        .qr-url-text { font-size: 11px; color: #64748b; word-break: break-all; margin-top: 8px; }

        .preview-container { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
        .img-preview { width: 65px; height: 65px; object-fit: cover; border-radius: 6px; border: 1px solid #475569; cursor: pointer; }
        
        .chart-box { background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; }
        .record-card { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 15px; margin-bottom: 15px; position: relative; }
        .record-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #334155; padding-bottom: 8px; margin-bottom: 10px; }
        .customer-name { font-size: 15px; font-weight: bold; color: #38bdf8; }
        .record-date { color: #94a3b8; font-size: 12px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .badge-normal { background: #064e3b; color: #34d399; }
        .badge-warning { background: #78350f; color: #fbbf24; }
        .badge-danger { background: #7f1d1d; color: #fca5a5; }
        .data-tag { background: #1e293b; padding: 3px 6px; border-radius: 4px; font-size: 12px; margin-right: 4px; display: inline-block; margin-top: 4px; border: 1px solid #334155; }
        .tag-title { color: #38bdf8; font-weight: bold; }
        
        .diagnosis-box { background: rgba(139, 92, 246, 0.1); border: 1px solid #8b5cf6; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .diagnosis-box h3 { color: #c4b5fd; margin-top: 0; margin-bottom: 10px; font-size: 17px; }
        .diagnosis-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #6d28d9; }
        .diag-title { font-weight: bold; color: #fca5a5; }
        .diag-solution { color: #a7f3d0; font-size: 13px; margin-top: 4px; display: block; }
        .diag-normal { color: #34d399; font-weight: bold; }

        .filter-alert { background: #0369a1; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>碩豐熱泵AI診斷與履歷戰情平台</h1>
    
    <!-- 頂部戰情室 KPI 看板 -->
    <div class="kpi-container">
        <div class="kpi-card" style="border-color: #38bdf8;">
            <div class="label">總巡檢紀錄數</div>
            <div class="num" id="kpi_total" style="color: #38bdf8;">0</div>
        </div>
        <div class="kpi-card" style="border-color: #34d399;">
            <div class="label">全機運轉正常</div>
            <div class="num" id="kpi_normal" style="color: #34d399;">0</div>
        </div>
        <div class="kpi-card" style="border-color: #fbbf24;">
            <div class="label">需注意 / 局部異常</div>
            <div class="num" id="kpi_warning" style="color: #fbbf24;">0</div>
        </div>
        <div class="kpi-card" style="border-color: #fca5a5;">
            <div class="label">嚴重故障 / 停機</div>
            <div class="num" id="kpi_danger" style="color: #fca5a5;">0</div>
        </div>
    </div>

    <div id="filter_notice" class="filter-alert" style="display:none;">
        <span>🔍 目前已鎖定主機編號：<strong id="filtered_id" style="color:#fef08a;"></strong> 的專屬維修履歷</span>
        <button style="padding:4px 10px; font-size:12px; background:#475569; color:white; border:none; border-radius:4px; cursor:pointer;" onclick="clearFilter()">解鎖顯示全部</button>
    </div>

    <!-- 表單區 -->
    <div class="grid-3">
        <!-- 欄位一：案場與設備項目管理 (參考鍋爐優化風格) -->
        <div class="card-box">
            <h2>📝 設備項目管理</h2>
            
            <div class="form-group">
                <label>客戶 / 案場名稱：</label>
                <input type="text" id="rec_customer" placeholder="例如：碩豐大飯店">
            </div>
            
            <div class="form-group">
                <label>主機型號 / 唯一編號：</label>
                <input type="text" id="rec_model" placeholder="例如：AH090" oninput="handleModelSearch();">
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>熱泵型態：</label>
                    <select id="rec_type" onchange="toggleWaterSection()">
                        <option value="AHP">AHP (空氣源)</option>
                        <option value="WHP">WHP (水源型)</option>
                        <option value="AWHP">AWHP (全效型)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>冷媒種類：</label>
                    <select id="rec_ref">
                        <option value="R417A">R417A</option>
                        <option value="R32">R32</option>
                        <option value="R410A">R410A</option>
                        <option value="R134a">R134a</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>電源相數：</label>
                    <select id="rec_phase"><option value="三相">三相 (3Ø)</option><option value="單相">單相 (1Ø)</option></select>
                </div>
                <div class="form-group">
                    <label>工作電壓：</label>
                    <select id="rec_volt"><option value="220V">220V</option><option value="380V" selected>380V</option><option value="440V">440V</option></select>
                </div>
            </div>

            <div class="form-group" style="background: rgba(56, 189, 248, 0.05); padding: 10px; border-radius: 8px; border: 1px solid #0284c7;">
                <label style="color:#38bdf8; font-weight:bold;">⚙️ 壓縮機額定電流值 (A)</label>
                <input type="number" id="local_rated_current" step="0.1" placeholder="例如：22">
            </div>

            <!-- 操作按鈕群組 (比照鍋爐版面) -->
            <div class="btn-action-group">
                <button class="btn-sm btn-blue" onclick="saveRecord()">儲存修改</button>
                <button class="btn-sm btn-green" onclick="saveRecord()">新增為新設備</button>
            </div>
            <button class="btn-sm btn-red" onclick="clearForm()">🗑️ 清除/刪除輸入</button>
            <button class="btn-sm btn-purple" onclick="generateMachineQR()">📱 生成專屬 QR Code</button>

            <!-- 二維碼展開區 -->
            <div id="qr_container" class="qr-section">
                <div class="qr-title" id="qr_device_name">📱 設備專屬 QR Code</div>
                <div id="qrcode-canvas"></div>
                <div id="qr_url_text" class="qr-url-text"></div>
            </div>
        </div>
        
        <!-- 欄位二：數據 -->
        <div class="card-box">
            <h2>📊 運轉數據 (用於診斷)</h2>
            <div class="sub-section-box">
                <label style="color:#a7f3d0; font-weight:bold;">⚡ A機實測電流 (A)</label>
                <div class="grid-inner-3"><input type="number" id="curr_a_r" placeholder="R相"><input type="number" id="curr_a_s" placeholder="S相"><input type="number" id="curr_a_t" placeholder="T相"></div>
            </div>
            <div class="sub-section-box">
                <label style="color:#a7f3d0; font-weight:bold;">⚡ B機實測電流 (A)</label>
                <div class="grid-inner-3"><input type="number" id="curr_b_r" placeholder="R相"><input type="number" id="curr_b_s" placeholder="S相"><input type="number" id="curr_b_t" placeholder="T相"></div>
            </div>

            <div class="sub-section-box">
                <label style="color:#38bdf8; font-weight:bold;">🌀 A 系統冷媒迴路</label>
                <div class="grid-2">
                    <div class="form-group"><label>低壓 (kg/cm²)</label><input type="number" id="lp_a" step="0.1"></div>
                    <div class="form-group"><label>高壓 (kg/cm²)</label><input type="number" id="hp_a" step="0.1"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>吸氣溫 (°C)</label><input type="number" id="tsuc_a" step="0.1"></div>
                    <div class="form-group"><label>排氣溫 (°C)</label><input type="number" id="tdis_a" step="0.1"></div>
                </div>
            </div>

            <div class="sub-section-box">
                <label style="color:#fef08a; font-weight:bold;">🌀 B 系統冷媒迴路</label>
                <div class="grid-2">
                    <div class="form-group"><label>低壓 (kg/cm²)</label><input type="number" id="lp_b" step="0.1"></div>
                    <div class="form-group"><label>高壓 (kg/cm²)</label><input type="number" id="hp_b" step="0.1"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>吸氣溫 (°C)</label><input type="number" id="tsuc_b" step="0.1"></div>
                    <div class="form-group"><label>排氣溫 (°C)</label><input type="number" id="tdis_b" step="0.1"></div>
                </div>
            </div>
        </div>
        
        <!-- 欄位三：水溫與處置 -->
        <div class="card-box">
            <h2>📸 水溫與處置報告</h2>
            <div class="sub-section-box">
                <label style="color:#f43f5e; font-weight:bold;">🔥 熱水側水溫</label>
                <div class="grid-2">
                    <div class="form-group"><label>熱水進水 (°C)</label><input type="number" id="h_in" step="0.1"></div>
                    <div class="form-group"><label>熱水出水 (°C)</label><input type="number" id="h_out" step="0.1"></div>
                </div>
            </div>
            
            <div class="sub-section-box" id="source_water_section" style="display:none;">
                <label style="color:#67e8f9; font-weight:bold;">💧 水源側水溫 (WHP/AWHP)</label>
                <div class="grid-2">
                    <div class="form-group"><label>水源進水 (°C)</label><input type="number" id="w_in" step="0.1"></div>
                    <div class="form-group"><label>水源出水 (°C)</label><input type="number" id="w_out" step="0.1"></div>
                </div>
            </div>

            <div class="form-group">
                <label>主機整體狀態判定：</label>
                <select id="rec_status">
                    <option value="正常">✅ 全機運轉正常</option>
                    <option value="注意">⚠️ 需注意/局部異常</option>
                    <option value="異常">❌ 嚴重故障/全面停機</option>
                </select>
            </div>
            <div class="form-group">
                <label>上傳現場照片 (支援多張同步)：</label>
                <input type="file" id="rec_photo" accept="image/*" multiple onchange="previewAndCompressImages(this)">
                <div id="photo_previews" class="preview-container"></div>
            </div>
            <div class="form-group">
                <label>維修與處置說明：</label>
                <textarea id="rec_notes" placeholder="寫入 AI 診斷或現場維修處置細節..."></textarea>
            </div>
        </div>
    </div>

    <!-- AI 診斷結果區 -->
    <div id="diagnosis_result" class="diagnosis-box">
        <h3>🤖 AI 專家系統診斷報告</h3>
        <div id="diagnosis_content"></div>
    </div>
    
    <div class="btn-group">
        <button class="btn-main btn-diagnose" onclick="runSmartDiagnosis()">🤖 執行專家級智慧診斷分析</button>
        <button class="btn-main btn-save" id="save_btn" onclick="saveRecord()">📥 儲存巡檢履歷至雲端</button>
        <button class="btn-main btn-export" onclick="exportToCSV()">📊 匯出 CSV 報表</button>
        <button class="btn-main btn-clear" onclick="clearForm()">重設表格</button>
    </div>
    
    <!-- Chart.js 趨勢圖表區 -->
    <div class="chart-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap;">
            <h3 style="color: #38bdf8; margin: 0; font-size: 16px;">📉 主機運轉歷史趨勢分析</h3>
            <select id="chart_type_select" onchange="updateChartData()" style="width: auto; padding: 4px 8px; font-size: 12px;">
                <option value="press">A/B機 高低壓走勢</option>
                <option value="temp">熱水/水源 進出水溫走勢</option>
            </select>
        </div>
        <canvas id="historyChart" style="max-height: 260px; width: 100%;"></canvas>
    </div>

    <!-- 歷史紀錄列表 -->
    <h2>🗂️ 歷史檢修履歷庫 (已載入 <span id="rec_count">0</span> 筆)</h2>
    <div class="form-group">
        <input type="text" id="search_input" oninput="renderRecords()" placeholder="🔍 搜尋案場、機號、處置紀錄...">
    </div>
    <div id="records_list"></div>
</div>

<script>
    let currentBase64Photos = []; 
    let historyChartInstance = null;
    let globalRecords = [];

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('m') || urlParams.get('id');
        if (deviceId) {
            document.getElementById("filter_notice").style.display = "flex";
            document.getElementById("filtered_id").innerText = deviceId;
            document.getElementById("rec_model").value = deviceId;
        }
        toggleWaterSection();
        fetchCloudRecords();
    };

    function fetchCloudRecords() {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.withSuccessHandler(function(data) {
                if (typeof data === "string") data = JSON.parse(data);
                globalRecords = data || [];
                renderRecords();
            }).getUsersData();
        } else {
            globalRecords = JSON.parse(localStorage.getItem("hp_ai_records_v8")) || [];
            renderRecords();
        }
    }

    function toggleWaterSection() {
        const type = document.getElementById("rec_type").value;
        document.getElementById("source_water_section").style.display = (type === "WHP" || type === "AWHP") ? "block" : "none";
    }

    function handleModelSearch() { renderRecords(); }

    function previewAndCompressImages(input) {
        const previewDiv = document.getElementById("photo_previews");
        previewDiv.innerHTML = "";
        currentBase64Photos = []; 
        if (!input.files || input.files.length === 0) return;
        
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    let width = img.width, height = img.height;
                    const max_size = 600; 
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext("2d").drawImage(img, 0, 0, width, height);
                    const b64 = canvas.toDataURL("image/jpeg", 0.7);
                    currentBase64Photos.push(b64); 
                    
                    const pImg = document.createElement("img");
                    pImg.src = b64; pImg.className = "img-preview"; pImg.onclick = function(){window.open(this.src)};
                    previewDiv.appendChild(pImg);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function generateMachineQR() {
        const modelId = document.getElementById("rec_model").value.trim();
        const customerName = document.getElementById("rec_customer").value.trim();
        if(!modelId) { alert("請先填寫「主機型號 / 唯一編號」！"); return; }
        
        const qrContainer = document.getElementById("qr_container");
        const qrCanvas = document.getElementById("qrcode-canvas");
        qrCanvas.innerHTML = ""; qrContainer.style.display = "block";
        
        document.getElementById("qr_device_name").innerText = `📱 ${customerName || modelId} 專屬 QR Code`;
        const targetUrl = `${window.location.href.split('?')[0]}?m=${encodeURIComponent(modelId)}`;
        document.getElementById("qr_url_text").innerText = targetUrl;
        new QRCode(qrCanvas, { text: targetUrl, width: 170, height: 170, colorDark: "#0f172a", colorLight: "#ffffff" });
    }

    function runSmartDiagnosis() {
        const ref = document.getElementById("rec_ref").value;
        const phase = document.getElementById("rec_phase").value;
        const type = document.getElementById("rec_type").value;
        const ratedCurrent = parseFloat(document.getElementById("local_rated_current").value); 
        
        let hp_upper_limit = (ref === "R410A" || ref === "R32") ? 33 : 23;
        let lp_lower_limit = (ref === "R410A" || ref === "R32") ? 5.5 : 3.0;

        let issuesHTML = "";
        let issuesText = "【AI 精準診斷報告】\n";
        let statusLevel = "正常"; 

        function updateStatus(newStatus) {
            if (newStatus === "異常") statusLevel = "異常";
            else if (newStatus === "注意" && statusLevel !== "異常") statusLevel = "注意";
        }

        function analyzeSystem(sysName, lpStr, hpStr, tsucStr, tdisStr, curRStr, curSStr, curTStr) {
            if (!lpStr && !hpStr && !tsucStr && !tdisStr) return; 

            let lp = parseFloat(lpStr), hp = parseFloat(hpStr);
            let tsuc = parseFloat(tsucStr), tdis = parseFloat(tdisStr);
            let sysIssues = [];
            
            if(!isNaN(tsuc) && tsuc > 15) {
                sysIssues.push({ level: "注意", err: `${sysName}冷媒吸入溫度過高 (${tsuc}°C > 15°C)`, sol: "吸氣過熱度偏高，請排查膨脹閥開度、過濾器半堵或冷媒微漏。" });
                updateStatus("注意");
            }

            if(!isNaN(tdis)) {
                if(tdis >= 100) {
                    sysIssues.push({ level: "異常", err: `${sysName}壓縮機出口溫度過高 (${tdis}°C >= 100°C)`, sol: "【🚨危險】排氣溫度達臨界值！請立刻停機，排查冷媒洩漏或電子膨脹閥故障！" });
                    updateStatus("異常");
                } else if(tdis > 90) {
                    sysIssues.push({ level: "注意", err: `${sysName}壓縮機出口溫度偏高 (${tdis}°C > 90°C)`, sol: "排氣溫度偏高，請排查換熱不良、負荷過重或輕微缺冷媒。" });
                    updateStatus("注意");
                }
            }
            
            if(!isNaN(hp) && hp > hp_upper_limit) {
                sysIssues.push({ level: "注意", err: `${sysName}高壓過高 (${hp} kg/cm²)`, sol: "請排查熱水循環流量不足、冷凝器結垢或冷媒充填過量。" });
                updateStatus("注意");
            }
            
            if(!isNaN(lp) && lp < lp_lower_limit) {
                if(type === "AHP" && !isNaN(tsuc) && tsuc < 2) {
                    sysIssues.push({ level: "注意", err: `${sysName}運轉低壓偏低 (${lp} kg/cm²)，吸氣溫偏低 (${tsuc}°C)`, sol: "研判為低環境溫度運轉或蒸發器結霜。請確認自動除霜機制。" });
                    updateStatus("注意");
                } else if (!isNaN(tdis) && tdis > 90) {
                    sysIssues.push({ level: "異常", err: `${sysName}低壓低且排氣高 (低壓:${lp} / 排氣:${tdis}°C)`, sol: "【異常】典型冷媒系統洩漏訊號！請進行氣密探漏並定量充填。" });
                    updateStatus("異常");
                } else {
                    sysIssues.push({ level: "注意", err: `${sysName}低壓過低 (${lp} kg/cm²)`, sol: "請檢查膨脹閥是否髒堵，或換熱鰭片嚴重髒污。" });
                    updateStatus("注意");
                }
            }
            
            let r = parseFloat(curRStr), s = parseFloat(curSStr), t = parseFloat(curTStr);
            if (!isNaN(r) || !isNaN(s) || !isNaN(t)) {
                let validVals = [r, s, t].filter(v => !isNaN(v));
                let maxCurrent = Math.max(...validVals);
                
                if (!isNaN(ratedCurrent) && ratedCurrent > 0 && maxCurrent > (ratedCurrent * 1.1)) {
                    sysIssues.push({ level: "注意", err: `${sysName}實測最高電流 (${maxCurrent}A) 超過額定電流 (${ratedCurrent}A) 的 110%`, sol: "壓縮機超載。請檢查高壓端壓力或電源電壓是否偏低。" });
                    updateStatus("注意");
                }

                if (phase === "三相" && !isNaN(r) && !isNaN(s) && !isNaN(t)) {
                    let avg = (r + s + t) / 3;
                    if(avg > 2.0) {
                        let maxDiff = Math.max(Math.abs(r-avg), Math.abs(s-avg), Math.abs(t-avg));
                        if((maxDiff / avg) > 0.12) {
                            sysIssues.push({ level: "注意", err: `${sysName}三相電流不平衡率達 ${(maxDiff/avg*100).toFixed(1)}% (>12%)`, sol: `目前 R:${r}A, S:${s}A, T:${t}A。請量測三相電壓或檢查電磁接觸器。` });
                            updateStatus("注意");
                        }
                    }
                }
            }

            if (sysIssues.length > 0) {
                issuesHTML += `<div class="diagnosis-item"><span class="diag-title">⚠️ ${sysName}提示：</span>`;
                issuesText += `[${sysName}]\n`;
                sysIssues.forEach(i => {
                    issuesHTML += `<span class="diag-solution" style="${i.level==='異常'?'color:#fca5a5; font-weight:bold;':''}">▪️ ${i.err}<br>👉 對策：${i.sol}</span>`;
                    issuesText += `- ${i.err} (對策: ${i.sol})\n`;
                });
                issuesHTML += `</div>`;
            } else {
                issuesHTML += `<div class="diagnosis-item"><span class="diag-normal">✅ ${sysName}系統運轉數據標準健全。</span></div>`;
            }
        }

        analyzeSystem("A機", 
            document.getElementById("lp_a").value, document.getElementById("hp_a").value, 
            document.getElementById("tsuc_a").value, document.getElementById("tdis_a").value,
            document.getElementById("curr_a_r").value, document.getElementById("curr_a_s").value, document.getElementById("curr_a_t").value
        );
        analyzeSystem("B機", 
            document.getElementById("lp_b").value, document.getElementById("hp_b").value, 
            document.getElementById("tsuc_b").value, document.getElementById("tdis_b").value,
            document.getElementById("curr_b_r").value, document.getElementById("curr_b_s").value, document.getElementById("curr_b_t").value
        );

        let h_in = parseFloat(document.getElementById("h_in").value);
        let h_out = parseFloat(document.getElementById("h_out").value);
        if (!isNaN(h_in) && !isNaN(h_out)) {
            let h_dt = h_out - h_in;
            if (h_dt <= 1.0 && h_in < 50) {
                issuesHTML += `<div class="diagnosis-item"><span class="diag-title">⚠️ 熱水側換熱無溫升 (ΔT=${h_dt.toFixed(1)}°C)</span><span class="diag-solution">👉 壓縮機可能未作功、四通閥串氣、或冷媒漏光。</span></div>`;
                issuesText += `[熱水水路] 水側換熱無明顯溫升。\n`;
                updateStatus("異常");
            } else if (h_dt > 8.5) {
                issuesHTML += `<div class="diagnosis-item"><span class="diag-title">⚠️ 熱水側大溫差異常 (ΔT=${h_dt.toFixed(1)}°C)</span><span class="diag-solution">👉 循環流量嚴重偏低！請即刻清洗 Y 型過濾網。</span></div>`;
                issuesText += `[熱水水路] 運轉溫差過大，流量不足。\n`;
                updateStatus("注意");
            }
        }

        document.getElementById("rec_status").value = statusLevel;

        const diagBox = document.getElementById("diagnosis_result");
        document.getElementById("diagnosis_content").innerHTML = issuesHTML;
        diagBox.style.display = "block";

        const notes = document.getElementById("rec_notes");
        let currentNotes = notes.value.replace(/【AI 精準診斷報告】[\s\S]*?(?=\n\n|$)/, "").trim();
        notes.value = issuesText + (currentNotes ? "\n\n" + currentNotes : "");
        
        diagBox.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function clearFilter() { window.location.href = window.location.pathname; }

    function saveRecord() {
        const customer = document.getElementById("rec_customer").value.trim();
        if (!customer) { alert("請填寫【客戶/案場名稱】！"); return; }
        
        const saveBtn = document.getElementById("save_btn");
        saveBtn.disabled = true;
        saveBtn.innerText = "⏳ 雲端同步中...";

        const now = new Date();
        const localDateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        const record = {
            id: Date.now(),
            date: localDateStr,
            customer, 
            model: document.getElementById("rec_model").value.trim(), 
            type: document.getElementById("rec_type").value, 
            ref: document.getElementById("rec_ref").value, 
            phase: document.getElementById("rec_phase").value, 
            volt: document.getElementById("rec_volt").value, 
            status: document.getElementById("rec_status").value, 
            notes: document.getElementById("rec_notes").value.trim(),
            rated_cur: document.getElementById("local_rated_current").value, 
            cur_a: [document.getElementById("curr_a_r").value, document.getElementById("curr_a_s").value, document.getElementById("curr_a_t").value],
            cur_b: [document.getElementById("curr_b_r").value, document.getElementById("curr_b_s").value, document.getElementById("curr_b_t").value],
            sys_a: [document.getElementById("lp_a").value, document.getElementById("hp_a").value, document.getElementById("tsuc_a").value, document.getElementById("tdis_a").value],
            sys_b: [document.getElementById("lp_b").value, document.getElementById("hp_b").value, document.getElementById("tsuc_b").value, document.getElementById("tdis_b").value],
            water: [document.getElementById("w_in").value, document.getElementById("w_out").value, document.getElementById("h_in").value, document.getElementById("h_out").value],
            photos: currentBase64Photos 
        };

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.withSuccessHandler(function(res) {
                alert("📥 數據與現場照片已成功寫入 Google Sheets 雲端試算表！");
                finalizeSave();
            }).doPost({ postData: { contents: JSON.stringify(record) } });
        } else {
            alert("📥 資料已存入本地儲存區。");
            finalizeSave();
        }

        function finalizeSave() {
            saveBtn.disabled = false;
            saveBtn.innerText = "📥 儲存巡檢履歷至雲端";
            clearForm(); 
            fetchCloudRecords();
        }
    }

    function clearForm() {
        document.querySelectorAll("input[type='number'], input[type='text'], textarea").forEach(i => i.value = "");
        document.getElementById("rec_photo").value = "";
        document.getElementById("photo_previews").innerHTML = "";
        document.getElementById("qr_container").style.display = "none";
        document.getElementById("diagnosis_result").style.display = "none";
        currentBase64Photos = []; 
        toggleWaterSection();
    }

    function renderRecords() {
        const list = document.getElementById("records_list");
        const searchInput = document.getElementById("search_input").value.toLowerCase();
        const modelInput = document.getElementById("rec_model").value.toLowerCase();
        const urlParams = new URLSearchParams(window.location.search);
        const filterId = urlParams.get('m') || urlParams.get('id');
        
        let filtered = globalRecords;

        if (filterId) {
            filtered = filtered.filter(r => r.model && r.model.toLowerCase() === filterId.toLowerCase());
        } else if (modelInput) {
            filtered = filtered.filter(r => r.model && r.model.toLowerCase().includes(modelInput));
        } else if (searchInput) {
            filtered = filtered.filter(r => (r.customer && r.customer.toLowerCase().includes(searchInput)) || (r.model && r.model.toLowerCase().includes(searchInput)) || (r.notes && r.notes.toLowerCase().includes(searchInput)));
        }

        document.getElementById("kpi_total").innerText = filtered.length;
        document.getElementById("kpi_normal").innerText = filtered.filter(r => r.status === "正常").length;
        document.getElementById("kpi_warning").innerText = filtered.filter(r => r.status === "注意").length;
        document.getElementById("kpi_danger").innerText = filtered.filter(r => r.status === "異常").length;
        document.getElementById("rec_count").innerText = filtered.length;

        list.innerHTML = filtered.length === 0 ? `<p style="text-align:center; color:#64748b;">尚無符合的檢修紀錄</p>` : "";

        filtered.forEach(r => {
            let badge = r.status === "正常" ? "badge-normal" : (r.status === "注意" ? "badge-warning" : "badge-danger");
            let pHTML = "";
            if (r.photos && r.photos.length > 0) {
                pHTML = `<div class="preview-container">` + 
                    r.photos.map(p => {
                        let srcStr = p.startsWith('data:') ? p : 'data:image/jpeg;base64,' + p;
                        return `<img src="${srcStr}" class="img-preview" onclick="window.open(this.src)">`;
                    }).join('') + 
                `</div>`;
            }
            
            list.innerHTML += `
                <div class="record-card">
                    <div class="record-header"><span class="customer-name">🏢 ${r.customer} (機號: ${r.model||'未填'})</span><span class="record-date">📅 ${r.date}</span></div>
                    <div>
                        <span class="badge ${badge}">${r.status}</span>
                        <span class="data-tag">型式: ${r.type}</span>
                        <span class="data-tag">冷媒: ${r.ref}</span>
                        <span class="data-tag">電源: ${r.phase}/${r.volt}</span>
                        ${r.rated_cur ? `<span class="data-tag" style="border-color:#38bdf8;">額定: ${r.rated_cur}A</span>` : ''}
                    </div>
                    <div style="margin-top:8px; font-size:13px; color:#cbd5e1;">
                        <div><span class="tag-title">⚡ 電流:</span> A機(R:${r.cur_a?.[0]||'-'}, S:${r.cur_a?.[1]||'-'}, T:${r.cur_a?.[2]||'-'}) | B機(R:${r.cur_b?.[0]||'-'}, S:${r.cur_b?.[1]||'-'}, T:${r.cur_b?.[2]||'-'})</div>
                        <div><span class="tag-title">🌀 冷媒:</span> A機(低:${r.sys_a?.[0]||'-'}/高:${r.sys_a?.[1]||'-'}) | B機(低:${r.sys_b?.[0]||'-'}/高:${r.sys_b?.[1]||'-'})</div>
                        <div><span class="tag-title">🔥 熱水側:</span> 進:${r.water?.[2]||'-'}°C / 出:${r.water?.[3]||'-'}°C</div>
                        ${(r.type === 'WHP' || r.type === 'AWHP') ? `<div><span class="tag-title">💧 水源側:</span> 進:${r.water?.[0]||'-'}°C / 出:${r.water?.[1]||'-'}°C</div>` : ''}
                        ${r.notes ? `<div style="margin-top:5px; white-space:pre-wrap; background:#1e293b; padding:8px; border-radius:6px; color:#94a3b8; border:1px solid #334155;">📝 ${r.notes}</div>` : ''}
                    </div>
                    ${pHTML}
                </div>`;
        });

        renderChart(filtered);
    }

    function renderChart(recordsData) {
        const ctx = document.getElementById('historyChart').getContext('2d');
        const chartType = document.getElementById('chart_type_select').value;
        
        const sorted = [...recordsData].sort((a,b) => new Date(a.date) - new Date(b.date));
        const labels = sorted.map(r => r.date ? r.date.split(' ')[0] : '無日期');

        let datasets = [];

        if (chartType === "press") {
            datasets = [
                { label: 'A機 高壓(kg/cm²)', data: sorted.map(r => parseFloat(r.sys_a?.[1]) || null), borderColor: '#f43f5e', backgroundColor: '#f43f5e', tension: 0.3 },
                { label: 'A機 低壓(kg/cm²)', data: sorted.map(r => parseFloat(r.sys_a?.[0]) || null), borderColor: '#38bdf8', backgroundColor: '#38bdf8', tension: 0.3 },
                { label: 'B機 高壓(kg/cm²)', data: sorted.map(r => parseFloat(r.sys_b?.[1]) || null), borderColor: '#fbbf24', backgroundColor: '#fbbf24', borderDash: [5, 5], tension: 0.3 },
                { label: 'B機 低壓(kg/cm²)', data: sorted.map(r => parseFloat(r.sys_b?.[0]) || null), borderColor: '#34d399', backgroundColor: '#34d399', borderDash: [5, 5], tension: 0.3 }
            ];
        } else if (chartType === "temp") {
            datasets = [
                { label: '熱水進水(°C)', data: sorted.map(r => parseFloat(r.water?.[2]) || null), borderColor: '#fb923c', backgroundColor: '#fb923c', tension: 0.3 },
                { label: '熱水出水(°C)', data: sorted.map(r => parseFloat(r.water?.[3]) || null), borderColor: '#f43f5e', backgroundColor: '#f43f5e', tension: 0.3 },
                { label: '水源進水(°C)', data: sorted.map(r => parseFloat(r.water?.[0]) || null), borderColor: '#38bdf8', backgroundColor: '#38bdf8', tension: 0.3 },
                { label: '水源出水(°C)', data: sorted.map(r => parseFloat(r.water?.[1]) || null), borderColor: '#818cf8', backgroundColor: '#818cf8', tension: 0.3 }
            ];
        }

        if (historyChartInstance) historyChartInstance.destroy();

        historyChartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#f1f5f9', font: { size: 11 } } } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });
    }

    function updateChartData() { renderRecords(); }

    function exportToCSV() {
        if (globalRecords.length === 0) { alert("目前尚無數據可供匯出！"); return; }
        let csvContent = "\uFEFF";
        csvContent += "日期,案場名稱,主機型號,型式,冷媒,電源相數,工作電壓,狀態,額定電流(A),A機R相,A機S相,A機T相,B機R相,B機S相,B機T相,A機低壓,A機高壓,A機吸氣,A機排氣,B機低壓,B機高壓,B機吸氣,B機排氣,熱水進水,熱水出水,水源進水,水源出水,備註\n";

        globalRecords.forEach(r => {
            let row = [
                `"${r.date}"`, `"${r.customer}"`, `"${r.model||''}"`, `"${r.type}"`, `"${r.ref}"`,
                `"${r.phase}"`, `"${r.volt}"`, `"${r.status}"`, `"${r.rated_cur||''}"`,
                `"${r.cur_a?.[0]||''}"`, `"${r.cur_a?.[1]||''}"`, `"${r.cur_a?.[2]||''}"`,
                `"${r.cur_b?.[0]||''}"`, `"${r.cur_b?.[1]||''}"`, `"${r.cur_b?.[2]||''}"`,
                `"${r.sys_a?.[0]||''}"`, `"${r.sys_a?.[1]||''}"`, `"${r.sys_a?.[2]||''}"`, `"${r.sys_a?.[3]||''}"`,
                `"${r.sys_b?.[0]||''}"`, `"${r.sys_b?.[1]||''}"`, `"${r.sys_b?.[2]||''}"`, `"${r.sys_b?.[3]||''}"`,
                `"${r.water?.[2]||''}"`, `"${r.water?.[3]||''}"`, `"${r.water?.[0]||''}"`, `"${r.water?.[1]||''}"`,
                `"${(r.notes||'').replace(/"/g, '""')}"`
            ];
            csvContent += row.join(",") + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `碩豐熱泵戰情維修履歷_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
