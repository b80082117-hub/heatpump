<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碩豐熱泵設備檢修紀錄與履歷管理系統</title>
    <style>
        body {
            font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 4px solid #0284c7;
            padding-bottom: 15px;
            font-size: 24px;
        }
        h2 {
            color: #38bdf8;
            font-size: 18px;
            margin-top: 0;
            border-bottom: 1px solid #475569;
            padding-bottom: 8px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .grid-3 {
                grid-template-columns: 1fr;
            }
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 13px;
        }
        select, input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #475569;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-save { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; }
        .btn-export { background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); color: white; }
        .btn-clear { background: #475569; color: white; }
        
        /* 紀錄列表樣式 */
        .record-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #334155;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .customer-name { font-size: 16px; font-weight: bold; color: #38bdf8; }
        .record-date { color: #94a3b8; font-size: 13px; }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 5px;
        }
        .badge-normal { background: #064e3b; color: #34d399; }
        .badge-warning { background: #78350f; color: #fbbf24; }
        .badge-danger { background: #7f1d1d; color: #fca5a5; }
        .data-tag {
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 5px;
            display: inline-block;
            margin-top: 5px;
        }
        .btn-delete {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #cbd5e1;
            color: #0f172a;
            width: 24px;
            height: 24px;
            padding: 0;
            border-radius: 50%;
            font-size: 12px;
            line-height: 24px;
            text-align: center;
        }
        .search-bar {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 工業級熱泵檢修紀錄工作台</h1>
    
    <!-- 第一部分：填寫新紀錄 -->
    <div class="grid-3">
        <div>
            <h2>🏢 案場基本資料</h2>
            <div class="form-group">
                <label for="rec_customer">客戶名稱</label>
                <input type="text" id="rec_customer" placeholder="例如：碩豐大酒店">
            </div>
            <div class="form-group">
                <label for="rec_model">主機型號 / 編號</label>
                <input type="text" id="rec_model" placeholder="例如：HP-50RT-01">
            </div>
            <div class="form-group">
                <label for="rec_ref">使用冷媒</label>
                <select id="rec_ref">
                    <option value="R417A">R417A</option>
                    <option value="R32">R32</option>
                    <option value="R410A">R410A</option>
                    <option value="R134a">R134a</option>
                </select>
            </div>
        </div>
        
        <div>
            <h2>📊 現場實測數據</h2>
            <div class="form-group">
                <label for="rec_lp">低壓力 (kg/cm²)</label>
                <input type="number" id="rec_lp" step="0.1">
            </div>
            <div class="form-group">
                <label for="rec_hp">高壓力 (kg/cm²)</label>
                <input type="number" id="rec_hp" step="0.1">
            </div>
            <div class="form-group">
                <label for="rec_tdis">壓縮機排氣溫度 (°C)</label>
                <input type="number" id="rec_tdis" step="0.1">
            </div>
        </div>
        
        <div>
            <h2>🔧 診斷結果與處置</h2>
            <div class="form-group">
                <label for="rec_status">運轉狀態判定</label>
                <select id="rec_status">
                    <option value="正常">✅ 系統運轉正常</option>
                    <option value="注意">⚠️ 需注意/局部異常</option>
                    <option value="異常">❌ 嚴重故障/停機維修</option>
                </select>
            </div>
            <div class="form-group">
                <label for="rec_notes">維修處置說明 (SOP / 更換零件)</label>
                <textarea id="rec_notes" placeholder="例如：清洗 Y 型過濾器、修復漏點重新抽真空定量充填冷媒..."></textarea>
            </div>
        </div>
    </div>
    
    <div class="btn-group">
        <button class="btn-save" onclick="saveRecord()">📥 儲存本次檢修紀錄</button>
        <button class="btn-export" onclick="exportToCSV()">📊 匯出 Excel (CSV)</button>
        <button class="btn-clear" onclick="clearForm()">重設表格</button>
    </div>
    
    <!-- 第二部分：歷史紀錄列表 -->
    <h2>🗂️ 歷史檢修履歷庫 (已儲存 <span id="rec_count">0</span> 筆)</h2>
    <div class="form-group search-bar">
        <input type="text" id="search_input" oninput="renderRecords()" placeholder="🔍 輸入關鍵字搜尋案場、型號或處置說明...">
    </div>
    
    <div id="records_list">
        <!-- 紀錄會動態生成在這裡 -->
    </div>
</div>

<script>
    // 頁面載入時自動讀取
    window.onload = function() {
        renderRecords();
    };

    // 儲存紀錄
    function saveRecord() {
        const customer = document.getElementById("rec_customer").value.trim();
        const model = document.getElementById("rec_model").value.trim();
        const ref = document.getElementById("rec_ref").value;
        const lp = document.getElementById("rec_lp").value;
        const hp = document.getElementById("rec_hp").value;
        const tdis = document.getElementById("rec_tdis").value;
        const status = document.getElementById("rec_status").value;
        const notes = document.getElementById("rec_notes").value.trim();
        
        if (!customer) {
            alert("請填寫【客戶/案場名稱】才能儲存！");
            return;
        }

        const date = new Date();
        const dateString = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

        const record = {
            id: Date.now(),
            date: dateString,
            customer, model, ref, lp, hp, tdis, status, notes
        };

        let records = JSON.parse(localStorage.getItem("hp_records")) || [];
        records.unshift(record); // 新的排前面
        localStorage.setItem("hp_records", JSON.stringify(records));

        alert("📥 紀錄儲存成功！");
        clearForm();
        renderRecords();
    }

    // 清空表單
    function clearForm() {
        document.getElementById("rec_customer").value = "";
        document.getElementById("rec_model").value = "";
        document.getElementById("rec_lp").value = "";
        document.getElementById("rec_hp").value = "";
        document.getElementById("rec_tdis").value = "";
        document.getElementById("rec_notes").value = "";
    }

    // 渲染歷史紀錄
    function renderRecords() {
        const recordsList = document.getElementById("records_list");
        const searchInput = document.getElementById("search_input").value.toLowerCase();
        let records = JSON.parse(localStorage.getItem("hp_records")) || [];
        
        // 篩選搜尋
        if (searchInput) {
            records = records.filter(r => 
                r.customer.toLowerCase().includes(searchInput) || 
                r.model.toLowerCase().includes(searchInput) || 
                r.notes.toLowerCase().includes(searchInput)
            );
        }

        document.getElementById("rec_count").innerText = records.length;
        recordsList.innerHTML = "";

        if (records.length === 0) {
            recordsList.innerHTML = `<p style="text-align:center; color:#64748b; padding:20px;">無檢修紀錄</p>`;
            return;
        }

        records.forEach(r => {
            let badgeClass = "badge-normal";
            if (r.status === "注意") badgeClass = "badge-warning";
            if (r.status === "異常") badgeClass = "badge-danger";

            recordsList.innerHTML += `
                <div class="record-card">
                    <button class="btn-delete" onclick="deleteRecord(${r.id})">❌</button>
                    <div class="record-header">
                        <span class="customer-name">🏢 ${r.customer} <span style="font-size:13px; color:#94a3b8; font-weight:normal;">(${r.model || '未填型號'})</span></span>
                        <span class="record-date">📅 ${r.date}</span>
                    </div>
                    <div>
                        <span class="badge ${badgeClass}">${r.status}</span>
                        <span class="data-tag">❄️ 冷媒: ${r.ref}</span>
                        ${r.lp ? `<span class="data-tag">⬇️ 低壓: ${r.lp} kg</span>` : ''}
                        ${r.hp ? `<span class="data-tag">⬆️ 高壓: ${r.hp} kg</span>` : ''}
                        ${r.tdis ? `<span class="data-tag">🔥 排氣: ${r.tdis} °C</span>` : ''}
                    </div>
                    <p style="margin: 10px 0 0 0; font-size:14px; color:#cbd5e1; background:#1e293b; padding:8px; border-radius:6px; white-space: pre-wrap;"><strong>處置備註：</strong>${r.notes || '無備註說明'}</p>
                </div>
            `;
        });
    }

    // 刪除單筆紀錄
    function deleteRecord(id) {
        if (confirm("確定要刪除這筆檢修紀錄嗎？確認後無法復原。")) {
            let records = JSON.parse(localStorage.getItem("hp_records")) || [];
            records = records.filter(r => r.id !== id);
            localStorage.setItem("hp_records", JSON.stringify(records));
            renderRecords();
        }
    }

    // 匯出成 Excel 可開的 CSV 檔
    function exportToCSV() {
        let records = JSON.parse(localStorage.getItem("hp_records")) || [];
        if (records.length === 0) {
            alert("目前沒有任何紀錄可以匯出！");
            return;
        }

        // CSV 標頭 (加上 BOM 防止 Excel 開啟時亂碼)
        let csvContent = "\uFEFF"; 
        csvContent += "日期時間,客戶案場,設備型號,冷媒種類,實測低壓(kg),實測高壓(kg),排氣溫度(C),運轉狀態,現場維修處置說明\n";

        records.forEach(r => {
            // 處理備註裡的換行與逗號，避免破壞 CSV 格式
            let safeNotes = (r.notes || "").replace(/"/g, '""').replace(/\n/g, ' ');
            csvContent += `"${r.date}","${r.customer}","${r.model}","${r.ref}","${r.lp}","${r.hp}","${r.tdis}","${r.status}","${safeNotes}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `熱泵檢修紀錄表_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
