<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碩豐熱泵智慧AI診斷與履歷管理平台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); border: 1px solid #334155; }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 25px; border-bottom: 4px solid #0284c7; padding-bottom: 15px; font-size: 24px; }
        h2 { color: #38bdf8; font-size: 16px; margin-top: 15px; margin-bottom: 10px; border-bottom: 1px solid #475569; padding-bottom: 5px; text-transform: uppercase; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-inner-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        @media (max-width: 850px) { .grid-3 { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; color: #94a3b8; font-size: 13px; }
        select, input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #475569; border-radius: 8px; box-sizing: border-box; font-size: 14px; background-color: #0f172a; color: #f1f5f9; }
        textarea { resize: vertical; height: 120px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; min-width: 150px; }
        .btn-diagnose { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white; flex-basis: 100%; margin-bottom: 10px; font-size: 18px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        .btn-save { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; }
        .btn-export { background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); color: white; }
        .btn-clear { background: #475569; color: white; }
        
        .preview-container { margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
        .img-preview { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; border: 1px solid #475569; cursor: pointer; }
        .record-card { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 15px; margin-bottom: 15px; position: relative; }
        .record-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #334155; padding-bottom: 8px; margin-bottom: 10px; padding-right: 35px; }
        .customer-name { font-size: 16px; font-weight: bold; color: #38bdf8; }
        .record-date { color: #94a3b8; font-size: 13px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .badge-normal { background: #064e3b; color: #34d399; }
        .badge-warning { background: #78350f; color: #fbbf24; }
        .badge-danger { background: #7f1d1d; color: #fca5a5; }
        .data-tag { background: #1e293b; padding: 3px 6px; border-radius: 4px; font-size: 12px; margin-right: 4px; display: inline-block; margin-top: 4px; border: 1px solid #334155; }
        .tag-title { color: #38bdf8; font-weight: bold; }
        
        /* 修正後的刪除按鈕樣式 */
        .btn-delete { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            background: #f43f5e; 
            color: white; 
            width: 26px; 
            height: 26px; 
            min-width: unset !important; 
            flex: none !important; 
            padding: 0; 
            border-radius: 50%; 
            font-size: 12px; 
            border: none; 
            cursor: pointer; 
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-delete:hover { background: #e11d48; }
        
        .diagnosis-box { background: rgba(139, 92, 246, 0.1); border: 1px solid #8b5cf6; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .diagnosis-box h3 { color: #c4b5fd; margin-top: 0; margin-bottom: 10px; font-size: 18px; }
        .diagnosis-box .diagnosis-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #6d28d9; }
        .diagnosis-box .diagnosis-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .diag-title { font-weight: bold; color: #fca5a5; }
        .diag-solution { color: #a7f3d0; font-size: 13px; margin-top: 4px; display: block; }
        .diag-normal { color: #34d399; font-weight: bold; }

        .qr-section { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #0284c7; margin-top: 10px; display: none; text-align: center; }
        #qrcode-canvas { display: inline-block; background: white; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .qr-url-text { font-size: 11px; color: #475569; word-break: break-all; margin-top: 5px; }
        .filter-alert { background: #0369a1; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .sub-section-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px; box-sizing: border-box; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 碩豐熱泵AI診斷與履歷平台</h1>
    
    <div id="filter_notice" class="filter-alert" style="display:none;">
        <span>🔍 目前已鎖定主機編號：<strong id="filtered_id" style="color:#38bdf8;"></strong> 的專屬維修履歷</span>
        <button style="flex:none; padding:4px 10px; font-size:12px; background:#475569; color:white; min-width:unset;" onclick="clearFilter()">解鎖顯示全部</button>
    </div>

    <!-- 表單區 -->
    <div class="grid-3">
        <!-- 欄位一 -->
        <div>
            <h2>🏢 案場與電氣規格</h2>
            <div class="form-group"><label>客戶/案場名稱</label><input type="text" id="rec_customer" placeholder="例如：碩豐大酒店"></div>
            <div class="form-group">
                <label>主機型號 / 唯一編號</label>
                <input type="text" id="rec_model" placeholder="請輸入編號" oninput="toggleQRBtn()">
                <button id="qr_gen_btn" style="padding:4px; font-size:12px; margin-top:5px; background:#0284c7; color:white; display:none; min-width:unset;" onclick="generateMachineQR()">🖨️ 生成專屬 QR Code</button>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>熱泵型式</label>
                    <select id="rec_type" onchange="toggleWaterSection()"><option value="AHP">AHP (空氣源)</option><option value="WHP">WHP (水源型)</option><option value="AWHP">AWHP (全效/雙源)</option></select>
                </div>
                <div class="form-group">
                    <label>使用冷媒</label>
                    <select id="rec_ref"><option value="R417A">R417A</option><option value="R32">R32</option><option value="R410A">R410A</option><option value="R134a">R134a</option></select>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>電源相數</label><select id="rec_phase"><option value="三相">三相 (3Ø)</option><option value="單相">單相 (1Ø)</option></select>
                </div>
                <div class="form-group">
                    <label>工作電壓</label><select id="rec_volt"><option value="220V">220V</option><option value="380V" selected>380V</option><option value="440V">440V</option></select>
                </div>
            </div>
            
            <div class="form-group" style="border: 2px dashed #0284c7; padding: 10px; border-radius: 8px; margin: 15px 0; background: rgba(2,132,199,0.1); box-sizing: border-box; width: 100%;">
                <label style="color:#38bdf8; font-weight: bold; font-size: 14px; display: block; margin-bottom: 6px;">⚙️ 壓縮機額定電流值 (A)</label>
                <input type="number" id="local_rated_current" step="0.1" placeholder="請輸入額定電流" style="border-color: #0284c7; background-color: #0f172a;">
            </div>

            <div class="sub-section-box">
                <label style="color:#38bdf8; font-weight:bold;">⚡ A機實測電流 (A)</label>
                <div class="grid-inner-3"><input type="number" id="curr_a_r" placeholder="R相"><input type="number" id="curr_a_s" placeholder="S相"><input type="number" id="curr_a_t" placeholder="T相"></div>
            </div>
            <div class="sub-section-box">
                <label style="color:#38bdf8; font-weight:bold;">⚡ B機實測電流 (A)</label>
                <div class="grid-inner-3"><input type="number" id="curr_b_r" placeholder="R相"><input type="number" id="curr_b_s" placeholder="S相"><input type="number" id="curr_b_t" placeholder="T相"></div>
            </div>
        </div>
        
        <!-- 欄位二 -->
        <div>
            <h2>📊 運轉數據 (用於診斷)</h2>
            <div class="sub-section-box">
                <label style="color:#a7f3d0; font-weight:bold;">🌀 A 系統冷媒迴路</label>
                <div class="grid-2">
                    <div class="form-group"><label>低壓 (kg/cm²)</label><input type="number" id="lp_a" step="0.1"></div>
                    <div class="form-group"><label>高壓 (kg/cm²)</label><input type="number" id="hp_a" step="0.1"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>吸氣溫 (°C)</label><input type="number" id="tsuc_a" step="0.1"></div>
                    <div class="form-group"><label>排氣溫 (°C)</label><input type="number" id="tdis_a" step="0.1"></div>
                </div>
            </div>
            <div class="sub-section-box">
                <label style="color:#fef08a; font-weight:bold;">🌀 B 系統冷媒迴路</label>
                <div class="grid-2">
                    <div class="form-group"><label>低壓 (kg/cm²)</label><input type="number" id="lp_b" step="0.1"></div>
                    <div class="form-group"><label>高壓 (kg/cm²)</label><input type="number" id="hp_b" step="0.1"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>吸氣溫 (°C)</label><input type="number" id="tsuc_b" step="0.1"></div>
                    <div class="form-group"><label>排氣溫 (°C)</label><input type="number" id="tdis_b" step="0.1"></div>
                </div>
            </div>
            <div class="sub-section-box">
                <label style="color:#f43f5e; font-weight:bold;">🔥 熱水側水溫</label>
                <div class="grid-2">
                    <div class="form-group"><label>熱水入水溫 (°C)</label><input type="number" id="h_in" step="0.1" placeholder="進主機"></div>
                    <div class="form-group"><label>熱水出水溫 (°C)</label><input type="number" id="h_out" step="0.1" placeholder="出主機"></div>
                </div>
            </div>
            <div class="sub-section-box" id="source_water_section" style="display:none;">
                <label style="color:#67e8f9; font-weight:bold;">💧 水源側水溫 (WHP/AWHP 專用)</label>
                <div class="grid-2">
                    <div class="form-group"><label>水源入水溫 (°C)</label><input type="number" id="w_in" step="0.1"></div>
                    <div class="form-group"><label>水源出水溫 (°C)</label><input type="number" id="w_out" step="0.1"></div>
                </div>
            </div>
        </div>
        
        <!-- 欄位三 -->
        <div>
            <h2>📸 處置與報告</h2>
            <div class="form-group">
                <label>主機整體狀態判定</label>
                <select id="rec_status">
                    <option value="正常">✅ 全機運轉正常</option>
                    <option value="注意">⚠️ 需注意/局部異常</option>
                    <option value="異常">❌ 嚴重故障/全面停機</option>
                </select>
            </div>
            <div class="form-group">
                <label>上傳現場照片 (支援同步多張上傳)</label>
                <input type="file" id="rec_photo" accept="image/*" multiple onchange="previewAndCompressImages(this)">
                <div id="photo_previews" class="preview-container"></div>
            </div>
            <div class="form-group">
                <label>維修處置說明 (智慧診斷會自動附加報告)</label>
                <textarea id="rec_notes" placeholder="例如：更換零件紀錄..."></textarea>
            </div>
        </div>
    </div>

    <!-- 智慧診斷結果顯示區 -->
    <div id="diagnosis_result" class="diagnosis-box">
        <h3>🤖 AI 專家系統診斷報告</h3>
        <div id="diagnosis_content"></div>
    </div>
    
    <!-- QR Code 顯示區 -->
    <div id="qr_container" class="qr-section">
        <h3 style="margin-top:0; color:#38bdf8;">📲 主機專屬維修履歷 QR Code</h3>
        <div id="qrcode-canvas"></div>
        <p id="qr_url_text" class="qr-url-text"></p>
    </div>
    
    <div class="btn-group">
        <button class="btn-diagnose" onclick="runSmartDiagnosis()">🤖 執行專家級智慧診斷分析</button>
        <button class="btn-save" id="save_btn" onclick="saveRecord()">📥 儲存本次巡檢與診斷紀錄</button>
        <button class="btn-export" onclick="exportToCSV()">📊 匯出總 Excel (CSV)</button>
        <button class="btn-clear" onclick="clearForm()">重設表格</button>
    </div>
    
    <!-- 歷史紀錄列表 -->
    <h2>🗂️ 歷史檢修履歷庫 (已儲存 <span id="rec_count">0</span> 筆)</h2>
    <div class="form-group">
        <input type="text" id="search_input" oninput="renderRecords()" placeholder="🔍 搜尋案場、型號、異常紀錄...">
    </div>
    <div id="records_list"></div>
</div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbycjmQjr0otxP-kJDnIMc2_9ZaSTs7YxQGT37HiO32u-Px6c2C0LHBgCA3w4gpx9w4Llg/exec";
    let currentBase64Photos = []; 

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('id');
        if (deviceId) {
            document.getElementById("filter_notice").style.display = "flex";
            document.getElementById("filtered_id").innerText = deviceId;
            document.getElementById("rec_model").value = deviceId;
            toggleQRBtn();
        }
        toggleWaterSection();
        renderRecords();
    };

    function toggleQRBtn() {
        const modelVal = document.getElementById("rec_model").value.trim();
        document.getElementById("qr_gen_btn").style.display = modelVal ? "inline-block" : "none";
    }

    function toggleWaterSection() {
        const type = document.getElementById("rec_type").value;
        const section = document.getElementById("source_water_section");
        section.style.display = (type === "WHP" || type === "AWHP") ? "block" : "none";
    }

    function previewAndCompressImages(input) {
        const previewDiv = document.getElementById("photo_previews");
        previewDiv.innerHTML = "";
        currentBase64Photos = []; 
        if (!input.files || input.files.length === 0) return;
        
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    let width = img.width, height = img.height;
                    const max_size = 600; 
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext("2d").drawImage(img, 0, 0, width, height);
                    const b64 = canvas.toDataURL("image/jpeg", 0.7);
                    currentBase64Photos.push(b64); 
                    
                    const pImg = document.createElement("img");
                    pImg.src = b64; pImg.className = "img-preview"; pImg.onclick = function(){window.open(this.src)};
                    previewDiv.appendChild(pImg);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function generateMachineQR() {
        const modelId = document.getElementById("rec_model").value.trim();
        if(!modelId) return;
        const qrContainer = document.getElementById("qr_container");
        const qrCanvas = document.getElementById("qrcode-canvas");
        qrCanvas.innerHTML = ""; qrContainer.style.display = "block";
        const targetUrl = `${window.location.href.split('?')[0]}?id=${encodeURIComponent(modelId)}`;
        document.getElementById("qr_url_text").innerText = targetUrl;
        new QRCode(qrCanvas, { text: targetUrl, width: 160, height: 160, colorDark: "#0f172a", colorLight: "#ffffff" });
    }

    function runSmartDiagnosis() {
        const ref = document.getElementById("rec_ref").value;
        const phase = document.getElementById("rec_phase").value;
        const type = document.getElementById("rec_type").value;
        const ratedCurrent = parseFloat(document.getElementById("local_rated_current").value); 
        
        let hp_upper_limit = (ref === "R410A" || ref === "R32") ? 33 : 23;
        let lp_lower_limit = (ref === "R410A" || ref === "R32") ? 5.5 : 3.0;

        let issuesHTML = "";
        let issuesText = "【AI 精準診斷報告】\n";
        let statusLevel = "正常"; 

        function updateStatus(newStatus) {
            if (newStatus === "異常") statusLevel = "異常";
            else if (newStatus === "注意" && statusLevel !== "異常") statusLevel = "注意";
        }

        function analyzeSystem(sysName, lpStr, hpStr, tsucStr, tdisStr, curRStr, curSStr, curTStr) {
            if (!lpStr && !hpStr && !tsucStr && !tdisStr) return; 

            let lp = parseFloat(lpStr), hp = parseFloat(hpStr);
            let tsuc = parseFloat(tsucStr), tdis = parseFloat(tdisStr);
            let sysIssues = [];
            
            if(!isNaN(tsuc) && tsuc > 15) {
                sysIssues.push({ level: "注意", err: `${sysName}冷媒吸入溫度過高 (${tsuc}°C > 15°C)`, sol: "【注意】吸氣過熱度偏高，請排查是否為膨脹閥開度不足、過濾器半堵、或冷媒充填量微漏減少。" });
                updateStatus("注意");
            }

            if(!isNaN(tdis)) {
                if(tdis >= 100) {
                    sysIssues.push({ level: "異常", err: `${sysName}壓縮機出口溫度過高 (${tdis}°C >= 100°C)`, sol: "【🚨危險】排氣溫度已達危險臨界值！極易造成冷凍油碳化與壓縮機燒毀，請立刻停機，全面排查冷媒洩漏或電子膨脹閥故障！" });
                    updateStatus("異常");
                } else if(tdis > 90) {
                    sysIssues.push({ level: "注意", err: `${sysName}壓縮機出口溫度偏高 (${tdis}°C > 90°C)`, sol: "【注意】排氣溫度偏高，請排查換熱不良、負荷過重或輕微缺冷媒狀況。" });
                    updateStatus("注意");
                }
            }
            
            if(!isNaN(hp) && hp > hp_upper_limit) {
                sysIssues.push({ level: "注意", err: `${sysName}高壓過高 (${hp} kg/cm²)`, sol: "請排查熱水循環流量不足、冷凝換熱器結垢、或系統內冷媒充填過量。" });
                updateStatus("注意");
            }
            
            if(!isNaN(lp) && lp < lp_lower_limit) {
                if(type === "AHP" && !isNaN(tsuc) && tsuc < 2) {
                    sysIssues.push({ level: "注意", err: `${sysName}運轉低壓偏低 (${lp} kg/cm²)，伴隨吸氣溫偏低 (${tsuc}°C)`, sol: "研判為低環境溫度運轉或蒸發器結霜。請確認自動除霜機制是否正常。" });
                    updateStatus("注意");
                } else if (!isNaN(tdis) && tdis > 90) {
                    sysIssues.push({ level: "異常", err: `${sysName}低壓低且排氣高 (低壓:${lp} / 排氣:${tdis}°C)`, sol: "【異常】典型冷媒系統洩漏訊號！請進行氣密探漏並重新定量充填。" });
                    updateStatus("異常");
                } else {
                    sysIssues.push({ level: "注意", err: `${sysName}低壓過低 (${lp} kg/cm²)`, sol: "請檢查膨脹閥是否髒堵、冰堵，或換熱鰭片嚴重髒污。" });
                    updateStatus("注意");
                }
            }
            
            let r = parseFloat(curRStr), s = parseFloat(curSStr), t = parseFloat(curTStr);
            let hasCurrent = (!isNaN(r) || !isNaN(s) || !isNaN(t));
            
            if (hasCurrent) {
                let validVals = [r, s, t].filter(v => !isNaN(v));
                let maxCurrent = Math.max(...validVals);
                
                if (!isNaN(ratedCurrent) && ratedCurrent > 0) {
                    if (maxCurrent > (ratedCurrent * 1.1)) {
                        sysIssues.push({ level: "注意", err: `${sysName}實測最高電流 (${maxCurrent}A) 超過額定電流 (${ratedCurrent}A) 的 110%`, sol: "【注意】壓縮機超載運轉。請檢查高壓端壓力是否過高、供電電壓是否偏低或壓縮機內部機械磨損。" });
                        updateStatus("注意");
                    }
                }

                if (phase === "三相" && !isNaN(r) && !isNaN(s) && !isNaN(t)) {
                    let avg = (r + s + t) / 3;
                    if(avg > 2.0) {
                        let maxDiff = Math.max(Math.abs(r-avg), Math.abs(s-avg), Math.abs(t-avg));
                        if((maxDiff / avg) > 0.12) {
                            sysIssues.push({ level: "注意", err: `${sysName}三相電流不平衡率達 ${(maxDiff/avg*100).toFixed(1)}% (>12%)`, sol: `目前 R:${r}A, S:${s}A, T:${t}A。請量測三相電源電壓是否平衡，或檢查電磁接觸器接點。` });
                            updateStatus("注意");
                        }
                    }
                }
            }

            if (sysIssues.length > 0) {
                issuesHTML += `<div class="diagnosis-item"><span class="diag-title">⚠️ ${sysName}提示：</span>`;
                issuesText += `[${sysName}]\n`;
                sysIssues.forEach(i => {
                    issuesHTML += `<span class="diag-solution" style="${i.level==='異常'?'color:#fca5a5; font-weight:bold;':''}">▪️ ${i.err}<br>👉 對策：${i.sol}</span>`;
                    issuesText += `- ${i.err} (對策: ${i.sol})\n`;
                });
                issuesHTML += `</div>`;
            } else {
                issuesHTML += `<div class="diagnosis-item"><span class="diag-normal">✅ ${sysName}系統運轉數據標準健全。</span></div>`;
            }
        }

        analyzeSystem("A機", 
            document.getElementById("lp_a").value, document.getElementById("hp_a").value, 
            document.getElementById("tsuc_a").value, document.getElementById("tdis_a").value,
            document.getElementById("curr_a_r").value, document.getElementById("curr_a_s").value, document.getElementById("curr_a_t").value
        );
        analyzeSystem("B機", 
            document.getElementById("lp_b").value, document.getElementById("hp_b").value, 
            document.getElementById("tsuc_b").value, document.getElementById("tdis_b").value,
            document.getElementById("curr_b_r").value, document.getElementById("curr_b_s").value, document.getElementById("curr_b_t").value
        );

        let h_in = parseFloat(document.getElementById("h_in").value);
        let h_out = parseFloat(document.getElementById("h_out").value);
        if (!isNaN(h_in) && !isNaN(h_out)) {
            let h_dt = h_out - h_in;
            if (h_dt <= 1.0 && h_in < 50) {
                issuesHTML += `<div class="diagnosis-item"><span class="diag-title">⚠️ 熱水側換熱無溫升 (ΔT=${h_dt.toFixed(1)}°C)</span><span class="diag-solution">👉 壓縮機可能未作功、四通閥串氣、或冷媒漏光。</span></div>`;
                issuesText += `[熱水水路] 水側換熱無明顯溫升。\n`;
                updateStatus("異常");
            } else if (h_dt > 8.5) {
                issuesHTML += `<div class="diagnosis-item"><span class="diag-title">⚠️ 熱水側大溫差異常 (ΔT=${h_dt.toFixed(1)}°C)</span><span class="diag-solution">👉 循環流量嚴重偏低！請即刻清洗 Y 型過濾網。</span></div>`;
                issuesText += `[熱水水路] 運轉溫差過大，流量不足。\n`;
                updateStatus("注意");
            }
        }

        if (type === "WHP" || type === "AWHP") {
            let w_in = parseFloat(document.getElementById("w_in").value);
            let w_out = parseFloat(document.getElementById("w_out").value);
            if (!isNaN(w_in) && !isNaN(w_out)) {
                let w_dt = Math.abs(w_out - w_in);
                if (w_dt < 1.0) {
                    issuesHTML += `<div class="diagnosis-item"><span class="diag-title">⚠️ 水源側無換熱溫差 (ΔT=${w_dt.toFixed(1)}°C)</span><span class="diag-solution">👉 蒸發器未進行換熱。</span></div>`;
                    updateStatus("注意");
                } else if (w_dt > 6.0) {
                    issuesHTML += `<div class="diagnosis-item"><span class="diag-title">⚠️ 水源側溫差過大危險 (ΔT=${w_dt.toFixed(1)}°C)</span><span class="diag-solution">👉 流量嚴重不足！有結冰凍裂蒸發器風險，請立刻處理。</span></div>`;
                    updateStatus("異常");
                }
            }
        }

        document.getElementById("rec_status").value = statusLevel;

        const diagBox = document.getElementById("diagnosis_result");
        document.getElementById("diagnosis_content").innerHTML = issuesHTML;
        diagBox.style.display = "block";

        const notes = document.getElementById("rec_notes");
        let currentNotes = notes.value.replace(/【AI 精準診斷報告】[\s\S]*?(?=\n\n|$)/, "").trim();
        notes.value = issuesText + (currentNotes ? "\n\n" + currentNotes : "");
        
        diagBox.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function clearFilter() { window.location.href = window.location.pathname; }

    function saveRecord() {
        const customer = document.getElementById("rec_customer").value.trim();
        if (!customer) { alert("請填寫【客戶/案場名稱】！"); return; }
        
        const saveBtn = document.getElementById("save_btn");
        saveBtn.disabled = true;
        saveBtn.innerText = "⏳ 多圖雲端同步中...";

        const now = new Date();
        const localDateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        const uploadedPhotosArray = currentBase64Photos.map(p => p.replace(/^data:image\/\w+;base64,/, ""));

        const record = {
            id: Date.now(),
            date: localDateStr,
            customer, 
            model: document.getElementById("rec_model").value.trim(), 
            type: document.getElementById("rec_type").value, 
            ref: document.getElementById("rec_ref").value, 
            phase: document.getElementById("rec_phase").value, 
            volt: document.getElementById("rec_volt").value, 
            status: document.getElementById("rec_status").value, 
            notes: document.getElementById("rec_notes").value.trim(),
            rated_cur: document.getElementById("local_rated_current").value, 
            cur_a: [document.getElementById("curr_a_r").value, document.getElementById("curr_a_s").value, document.getElementById("curr_a_t").value],
            cur_b: [document.getElementById("curr_b_r").value, document.getElementById("curr_b_s").value, document.getElementById("curr_b_t").value],
            sys_a: [document.getElementById("lp_a").value, document.getElementById("hp_a").value, document.getElementById("tsuc_a").value, document.getElementById("tdis_a").value],
            sys_b: [document.getElementById("lp_b").value, document.getElementById("hp_b").value, document.getElementById("tsuc_b").value, document.getElementById("tdis_b").value],
            water: [document.getElementById("w_in").value, document.getElementById("w_out").value, document.getElementById("h_in").value, document.getElementById("h_out").value],
            photos: currentBase64Photos 
        };

        const syncPayload = JSON.parse(JSON.stringify(record));
        delete syncPayload.rated_cur; 
        syncPayload.photos = uploadedPhotosArray;

        let records = JSON.parse(localStorage.getItem("hp_ai_records_v7")) || [];
        records.unshift(record);
        localStorage.setItem("hp_ai_records_v7", JSON.stringify(records));

        if (CLOUD_API_URL && !CLOUD_API_URL.includes("XXXXXX")) {
            fetch(CLOUD_API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify(syncPayload)
            })
            .then(response => response.text())
            .then(data => {
                alert("📥 數據與多張現場照片已完美同步至 Google 雲端！");
                finalizeSave();
            })
            .catch(err => {
                alert("💾 資料已存入本地，但雲端上傳失敗。請確認網路或後端設定。");
                finalizeSave();
            });
        } else {
            alert("📥 資料已成功儲存至本地瀏覽器。");
            finalizeSave();
        }

        function finalizeSave() {
            saveBtn.disabled = false;
            saveBtn.innerText = "📥 儲存本次巡檢與診斷紀錄";
            clearForm(); 
            renderRecords();
        }
    }

    function clearForm() {
        document.querySelectorAll("input[type='number'], input[type='text'], textarea").forEach(i => i.value = "");
        document.getElementById("rec_photo").value = "";
        document.getElementById("photo_previews").innerHTML = "";
        document.getElementById("qr_container").style.display = "none";
        document.getElementById("diagnosis_result").style.display = "none";
        currentBase64Photos = []; 
        toggleQRBtn();
        toggleWaterSection();
    }

    function deleteRecord(id) {
        if (!confirm("確定要刪除這筆維修履歷紀錄嗎？")) return;
        let records = JSON.parse(localStorage.getItem("hp_ai_records_v7")) || [];
        records = records.filter(r => r.id !== id);
        localStorage.setItem("hp_ai_records_v7", JSON.stringify(records));
        renderRecords();
    }

    function renderRecords() {
        const list = document.getElementById("records_list");
        const searchInput = document.getElementById("search_input").value.toLowerCase();
        const filterId = new URLSearchParams(window.location.search).get('id');
        let records = JSON.parse(localStorage.getItem("hp_ai_records_v7")) || [];
        
        if (filterId) records = records.filter(r => r.model && r.model.toLowerCase() === filterId.toLowerCase());
        else if (searchInput) records = records.filter(r => r.customer.toLowerCase().includes(searchInput) || r.model.toLowerCase().includes(searchInput) || r.notes.toLowerCase().includes(searchInput));

        document.getElementById("rec_count").innerText = records.length;
        list.innerHTML = records.length === 0 ? `<p style="text-align:center; color:#64748b;">無履歷紀錄</p>` : "";

        records.forEach(r => {
            let badge = r.status === "正常" ? "badge-normal" : (r.status === "注意" ? "badge-warning" : "badge-danger");
            let pHTML = "";
            if (r.photos && r.photos.length > 0) {
                pHTML = `<div class="preview-container">` + 
                    r.photos.map(p => {
                        let srcStr = p.startsWith('data:') ? p : 'data:image/jpeg;base64,' + p;
                        return `<img src="${srcStr}" class="img-preview" onclick="window.open(this.src)">`;
                    }).join('') + 
                `</div>`;
            }
            
            list.innerHTML += `
                <div class="record-card">
                    <button class="btn-delete" onclick="deleteRecord(${r.id})" title="刪除紀錄">✕</button>
                    <div class="record-header"><span class="customer-name">🏢 ${r.customer} (機號: ${r.model||'未填'})</span><span class="record-date">📅 ${r.date}</span></div>
                    <div>
                        <span class="badge ${badge}">${r.status}</span>
                        <span class="data-tag">型式: ${r.type}</span>
                        <span class="data-tag">冷媒: ${r.ref}</span>
                        <span class="data-tag">電源: ${r.phase}/${r.volt}</span>
                        ${r.rated_cur ? `<span class="data-tag" style="border-color:#38bdf8;">本地額定: ${r.rated_cur}A</span>` : ''}
                    </div>
                    
                    <div style="margin-top:8px; font-size:12px; color:#cbd5e1; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div style="background:rgba(255,255,255,0.02); padding:6px; border-radius:4px;"><strong>🅰️ A系統：</strong>低壓 ${r.sys_a[0]||'-'} / 高壓 ${r.sys_a[1]||'-'} | 吸 ${r.sys_a[2]||'-'} / 排 ${r.sys_a[3]||'-'}<br>電流: R:${r.cur_a[0]||'-'} / S:${r.cur_a[1]||'-'} / T:${r.cur_a[2]||'-'}</div>
                        <div style="background:rgba(255,255,255,0.02); padding:6px; border-radius:4px;"><strong>🅱️ B系統：</strong>低壓 ${r.sys_b[0]||'-'} / 高壓 ${r.sys_b[1]||'-'} | 吸 ${r.sys_b[2]||'-'} / 排 ${r.sys_b[3]||'-'}<br>電流: R:${r.cur_b[0]||'-'} / S:${r.cur_b[1]||'-'} / T:${r.cur_b[2]||'-'}</div>
                    </div>
                    <div style="margin-top:5px; font-size:12px; color:#94a3b8;">
                        💧 熱水水溫：進 ${r.water[2]||'-'}°C / 出 ${r.water[3]||'-'}°C ${r.water[0] ? `| 水源水溫：進 ${r.water[0]}°C / 出 ${r.water[1]}°C` : ''}
                    </div>
                    ${r.notes ? `<div style="margin-top:8px; font-size:13px; color:#e2e8f0; white-space: pre-wrap; background:rgba(0,0,0,0.2); padding:8px; border-radius:6px;">📝 <strong>說明與診斷：</strong><br>${r.notes}</div>` : ''}
                    ${pHTML}
                </div>
            `;
        });
    }

    function exportToCSV() {
        let records = JSON.parse(localStorage.getItem("hp_ai_records_v7")) || [];
        if (records.length === 0) { alert("目前沒有可匯出的履歷紀錄！"); return; }

        let csvContent = "\uFEFF"; // UTF-8 BOM 防中文亂碼
        csvContent += "日期,客戶名稱,主機型號,熱泵型式,冷媒,電源,額定電流,狀態,A機低壓,A機高壓,A機吸溫,A機排溫,A機R相,A機S相,A機T相,B機低壓,B機高壓,B機吸溫,B機排溫,B機R相,B機S相,B機T相,熱水進水溫,熱水出水溫,處置說明\n";

        records.forEach(r => {
            let row = [
                `"${r.date}"`,
                `"${r.customer}"`,
                `"${r.model || ''}"`,
                `"${r.type}"`,
                `"${r.ref}"`,
                `"${r.phase}/${r.volt}"`,
                `"${r.rated_cur || ''}"`,
                `"${r.status}"`,
                `"${r.sys_a[0] || ''}"`, `"${r.sys_a[1] || ''}"`, `"${r.sys_a[2] || ''}"`, `"${r.sys_a[3] || ''}"`,
                `"${r.cur_a[0] || ''}"`, `"${r.cur_a[1] || ''}"`, `"${r.cur_a[2] || ''}"`,
                `"${r.sys_b[0] || ''}"`, `"${r.sys_b[1] || ''}"`, `"${r.sys_b[2] || ''}"`, `"${r.sys_b[3] || ''}"`,
                `"${r.cur_b[0] || ''}"`, `"${r.cur_b[1] || ''}"`, `"${r.cur_b[2] || ''}"`,
                `"${r.water[2] || ''}"`, `"${r.water[3] || ''}"`,
                `"${(r.notes || '').replace(/"/g, '""')}"`
            ];
            csvContent += row.join(",") + "\n";
        });

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `碩豐熱泵維修履歷表_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
